<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            color: var(--tg-theme-button-color, #40a7e3);
            margin-bottom: 20px;
        }

        button {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        button.secondary {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .user-info {
            text-align: left;
            padding: 10px;
            background: var(--tg-theme-bg-color, #ffffff);
            border-radius: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 My Telegram Mini App</h1>

        <div class="card">
            <h2>Welcome!</h2>
            <p>This is a simple Telegram Mini App example.</p>

            <div id="userInfo" class="user-info">
                <p>Loading user info...</p>
            </div>

            <button onclick="showAlert()">Show Alert</button>
            <button class="secondary" onclick="shareMessage()">Share</button>
            <button onclick="closeApp()">Close App</button>
        </div>

        <div class="card">
            <h3>Counter: <span id="counter">0</span></h3>
            <button onclick="increment()">Increment</button>
            <button class="secondary" onclick="reset()">Reset</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
</body>
</html>
